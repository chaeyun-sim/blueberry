<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 — BlueBerry</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
        --border: #e4e4e7;
        --card: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --border: #27272a;
          --card: #18181b;
        }
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 48px 40px;
        text-align: center;
        max-width: 360px;
        width: 100%;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 20px;
        display: block;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 28px;
      }
      button {
        background: var(--fg);
        color: var(--bg);
        border: none;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon">🫐</span>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결을 확인한 후<br />다시 시도해 주세요.</p>
      <button onclick="location.reload()">다시 시도</button>
    </div>
  </body>
</html>
